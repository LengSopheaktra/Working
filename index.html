    <button onclick="pressNumber(1)">1</button>
    <button onclick="pressPlus()">+</button>
    <button onclick="pressNumber(2)">2</button>
    <button onclick="pressEqual()">=</button>

    <h1 id="txt">Result:</h1>



    <script>    
        // let s = document.getElementById('txt');
        // console.log(`Get Data : ${s.innerText}`);

        // let Okay = document.getElementById('txtWelcome');

        // function Click(){

        //     rs.innerText = "Result: Hello Bro";
        // }
        let firstNumber = "";
        let secondNumber = "";
        let operator = "";
        let isSecond = false;

        let txt = document.getElementById("txt");

        function pressNumber(num) {
            if (!isSecond) {
                firstNumber += num;
                txt.innerText = `Result: ${firstNumber}`;
            } else {
                secondNumber += num;
                txt.innerText = `Result: ${firstNumber} ${operator} ${secondNumber}`;
            }
        }

        function pressPlus() {
            if (firstNumber !== "") {
                operator = "+";
                isSecond = true;
                txt.innerText = `Result: ${firstNumber} +`;
            }
        }

        function pressEqual() {
            if (firstNumber !== "" && secondNumber !== "" && operator === "+") {
                let total = Number(firstNumber) + Number(secondNumber);
                txt.innerText = `Result: ${firstNumber} + ${secondNumber} = ${total}`;
            }
        }
    </script>
